<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps - Mataram</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS Animations -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-blue-600 text-white p-4 fixed w-full top-0 z-50 shadow-md">
  <div class="flex justify-between items-center max-w-6xl mx-auto">
    <h1 class="font-bold text-xl">Mataram</h1>
    <ul class="flex gap-4 text-sm">
      <li><a href="index.html" class="hover:underline">Home</a></li>
      <li><a href="destinasi.html" class="hover:underline">Destinasi</a></li>
      <li><a href="aktivitas.html" class="hover:underline">Aktivitas</a></li>
      <li><a href="budaya.html" class="hover:underline">Budaya</a></li>
      <li><a href="kuliner.html" class="hover:underline">Kuliner</a></li>
      <li><a href="maps.html" class="hover:underline font-semibold">Maps</a></li>
      <li><a href="booking.html" class="hover:underline">Booking</a></li>
    </ul>
  </div>
</nav>

<div class="pt-24"></div>

<!-- JUDUL -->
<section class="p-6 text-center" data-aos="fade-up" data-aos-duration="1200">
  <h1 class="text-3xl md:text-4xl font-bold mb-2">Peta Wisata Mataram</h1>
  <p class="text-gray-600 text-lg md:text-xl">Lokasi destinasi populer</p>
</section>

<!-- MAPS -->
<section class="max-w-6xl mx-auto p-6 space-y-8">

  <!-- Gunung Rinjani -->
  <div class="bg-white rounded shadow-lg p-4" data-aos="fade-up">
    <h2 class="text-2xl font-bold mb-2">Gunung Rinjani</h2>
    <iframe 
      src="https://maps.google.com/maps?q=Gunung%20Rinjani&t=&z=13&ie=UTF8&iwloc=&output=embed"
      class="w-full h-64 rounded"
      loading="lazy">
    </iframe>
  </div>

  <!-- Pantai Senggigi -->
  <div class="bg-white rounded shadow-lg p-4" data-aos="fade-up" data-aos-delay="100">
    <h2 class="text-2xl font-bold mb-2">Pantai Senggigi</h2>
    <iframe 
      src="https://maps.google.com/maps?q=Pantai%20Senggigi&t=&z=13&ie=UTF8&iwloc=&output=embed"
      class="w-full h-64 rounded"
      loading="lazy">
    </iframe>
  </div>

  <!-- Resto Kuliner -->
  <div class="bg-white rounded shadow-lg p-4" data-aos="fade-up" data-aos-delay="200">
    <h2 class="text-2xl font-bold mb-2">Resto Kuliner Mataram</h2>
    <iframe 
      src="https://maps.google.com/maps?q=restoran%20mataram&t=&z=13&ie=UTF8&iwloc=&output=embed"
      class="w-full h-64 rounded"
      loading="lazy">
    </iframe>
  </div>

</section>

<!-- SCRIPT AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ once: true });
</script>

</html>
